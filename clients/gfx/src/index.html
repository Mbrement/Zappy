<!DOCTYPE html>
<html lang="en" style="background-color: #222222">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zappy Graphical Interface</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="connectMenu" data-module="ConnectMenu">
        <h1 id="title">Zappy</h1>
        <div id="connectInputContainer">
            <p id="connectTitle">Connect to a server</p>
            <div id="formContainer">
                <div class="inputContainer">
                    <label for="address">Address</label>
                    <div class="inputDesign">
                        <input type="text" id="address" name="address" placeholder="localhost" required/>
                    </div>
                </div>
                <div class="inputContainer">
                    <label for="port">Port</label>
                    <div class="inputDesign">
                        <input type="text" id="port" name="port" placeholder="4242" required/>
                    </div>
                </div>
                <p id="errorText">I am special</p>
                <button id="connectButton" data-action="connect">Connect</button>
            </div>
        </div>
    </div>
    <canvas id="webgpu" class="webgpu"></canvas>
    <script src="Main.js"></script>
</body>
</html>
